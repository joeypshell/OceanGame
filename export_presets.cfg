[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=".codex/**,.github/**,.mcp/**,addons/**,builds/**,exports/**,node_modules/**,artifacts/**,test-results/**,playwright-report/**,playwright-report-mobile-like/**,docs/**,tests/**,package.json,package-lock.json,AGENTS.md,README.md"
export_path="exports/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<style>html, body { margin: 0; padding: 0; width: 100%; height: 100%; min-height: 100vh; overflow: hidden; touch-action: none; background: #062235; } body { position: fixed; inset: 0; } canvas, #canvas { position: fixed; inset: 0; display: block; width: 100vw !important; height: 100vh !important; max-width: none !important; max-height: none !important; }</style>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/ensure_cross_origin_isolation_headers=true
progressive_web_app/offline_page=""
progressive_web_app/display=1
progressive_web_app/orientation=1
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0.024, 0.133, 0.208, 1)
