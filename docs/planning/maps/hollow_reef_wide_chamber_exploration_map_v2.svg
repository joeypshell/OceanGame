<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">OceanGame Hollow Reef Exploration Map</title>
  <desc id="desc">Dave the Diver inspired side-view exploration planning map for Dusk Trench, Hollow Reef, and Wide Reef Chamber.</desc>
  <defs>
    <style>
      .bg { fill: #020406; }
      .depth { stroke: #d7e5e9; stroke-width: 2; stroke-dasharray: 6 8; opacity: 0.45; }
      .depth-label { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #edf7fa; }
      .title { font: 800 42px "Segoe UI", Arial, sans-serif; fill: #f4fbff; }
      .label { font: 700 19px "Segoe UI", Arial, sans-serif; fill: #f0fbff; paint-order: stroke; stroke: #020406; stroke-width: 5; stroke-linejoin: round; }
      .small { font: 650 15px "Segoe UI", Arial, sans-serif; fill: #d4e8ef; paint-order: stroke; stroke: #020406; stroke-width: 4; stroke-linejoin: round; }
      .note { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #aac3cc; }
      .rock { fill: #667f88; stroke: #8ba7ae; stroke-width: 3; }
      .rock2 { fill: #526b74; stroke: #76929b; stroke-width: 3; }
      .rock3 { fill: #405962; stroke: #68848e; stroke-width: 3; }
      .moss { fill: none; stroke: #6c9c58; stroke-width: 3; opacity: 0.7; }
      .kelp { fill: none; stroke: #548f93; stroke-width: 5; opacity: 0.65; }
      .cave { fill: #071014; stroke: #2b4249; stroke-width: 4; }
      .route { fill: none; stroke: #72e5ff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65; stroke-dasharray: 14 12; }
      .return { fill: none; stroke: #7cffd8; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65; }
      .locked { fill: #162333; stroke: #90b8dc; stroke-width: 4; stroke-dasharray: 9 7; }
      .icon-ring-yellow { fill: #182026; stroke: #ffe961; stroke-width: 6; }
      .icon-ring-blue { fill: #182026; stroke: #79d9ff; stroke-width: 6; }
      .icon-ring-green { fill: #182026; stroke: #7df3a6; stroke-width: 6; }
      .icon-ring-red { fill: #182026; stroke: #ff6666; stroke-width: 6; }
      .icon-core { fill: #e8f8ff; }
      .fish-a { fill: #8895a0; stroke: #d6e4ef; stroke-width: 2; }
      .fish-b { fill: #6a747b; stroke: #c0ced7; stroke-width: 2; }
      .fish-c { fill: #d36f3f; stroke: #ffbb77; stroke-width: 2; }
      .jelly { fill: #a7a5b7; stroke: #d8d6ee; stroke-width: 2; opacity: 0.78; }
      .legend { fill: #05080b; stroke: #1f323a; stroke-width: 3; opacity: 0.95; }
    </style>
    <g id="rock-tile">
      <rect class="rock" x="0" y="0" width="82" height="54" rx="11"/>
      <rect class="rock2" x="8" y="7" width="30" height="15" rx="5"/>
      <path class="moss" d="M10 42 C24 32 42 47 58 34 C66 28 74 30 80 34"/>
      <path class="kelp" d="M60 50 C58 38 64 30 62 18"/>
    </g>
    <g id="small-rock">
      <rect class="rock3" x="0" y="0" width="54" height="38" rx="9"/>
      <path class="moss" d="M6 29 C16 22 28 32 42 24"/>
    </g>
    <g id="jelly">
      <ellipse class="jelly" cx="0" cy="0" rx="16" ry="20"/>
      <path class="jelly" d="M-9 12 C-14 28 -4 32 -8 46 M0 14 C-3 30 6 34 2 48 M9 12 C6 28 18 32 12 46" fill="none"/>
    </g>
    <g id="fish">
      <path class="fish-a" d="M0 16 C36 -10 86 -2 116 18 C82 38 34 42 0 16 Z"/>
      <path class="fish-a" d="M108 18 L142 0 L132 24 L144 44 Z"/>
      <circle cx="28" cy="13" r="4" fill="#f4fbff"/>
    </g>
    <g id="shark">
      <path class="fish-b" d="M0 22 C42 -6 118 -4 168 26 C110 48 42 52 0 22 Z"/>
      <path class="fish-b" d="M76 4 L100 -26 L106 12 Z"/>
      <path class="fish-b" d="M160 26 L206 2 L196 30 L210 58 Z"/>
      <circle cx="40" cy="18" r="4" fill="#eef8ff"/>
    </g>
    <g id="gulper">
      <path class="fish-c" d="M0 36 C30 -20 112 -18 142 28 C108 88 32 92 0 36 Z"/>
      <path fill="#ffd28a" d="M22 28 C48 18 82 18 108 30 C76 52 46 54 22 28 Z"/>
      <circle cx="104" cy="20" r="6" fill="#ffe7b8"/>
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>
  <line class="depth" x1="42" y1="130" x2="1558" y2="130"/>
  <line class="depth" x1="42" y1="340" x2="1558" y2="340"/>
  <line class="depth" x1="42" y1="560" x2="1558" y2="560"/>
  <line class="depth" x1="42" y1="780" x2="1558" y2="780"/>
  <text class="depth-label" x="44" y="122">175m</text>
  <text class="depth-label" x="44" y="332">200m</text>
  <text class="depth-label" x="44" y="552">225m</text>
  <text class="depth-label" x="44" y="772">250m</text>
  <text class="depth-label" x="1504" y="122">175m</text>
  <text class="depth-label" x="1504" y="332">200m</text>
  <text class="depth-label" x="1504" y="552">225m</text>
  <text class="depth-label" x="1504" y="772">250m</text>

  <!-- Left Dusk trench wall -->
  <g transform="translate(80 80)">
    <use href="#rock-tile" x="0" y="0"/><use href="#rock-tile" x="18" y="48"/><use href="#rock-tile" x="-6" y="98"/>
    <use href="#rock-tile" x="28" y="152"/><use href="#rock-tile" x="0" y="204"/><use href="#rock-tile" x="32" y="258"/>
    <use href="#rock-tile" x="-12" y="310"/><use href="#rock-tile" x="22" y="364"/><use href="#rock-tile" x="-4" y="418"/>
    <use href="#rock-tile" x="30" y="472"/><use href="#rock-tile" x="-10" y="526"/><use href="#rock-tile" x="20" y="580"/>
  </g>

  <!-- Upper route shelves -->
  <g transform="translate(220 220)">
    <use href="#rock-tile" x="0" y="0"/><use href="#rock-tile" x="74" y="-16"/><use href="#rock-tile" x="148" y="-4"/>
    <use href="#rock-tile" x="218" y="28"/><use href="#rock-tile" x="292" y="70"/><use href="#rock-tile" x="366" y="106"/>
    <use href="#rock-tile" x="438" y="140"/><use href="#small-rock" x="254" y="-46"/><use href="#small-rock" x="516" y="164"/>
  </g>

  <g transform="translate(780 180)">
    <use href="#rock-tile" x="0" y="0"/><use href="#rock-tile" x="70" y="34"/><use href="#rock-tile" x="140" y="68"/>
    <use href="#rock-tile" x="210" y="104"/><use href="#rock-tile" x="280" y="140"/><use href="#rock-tile" x="350" y="174"/>
    <use href="#small-rock" x="114" y="-34"/><use href="#small-rock" x="430" y="198"/>
  </g>

  <!-- Hollow Reef cave cluster -->
  <g transform="translate(456 454)">
    <use href="#rock-tile" x="0" y="20"/><use href="#rock-tile" x="74" y="-8"/><use href="#rock-tile" x="148" y="18"/>
    <use href="#rock-tile" x="222" y="58"/><use href="#rock-tile" x="296" y="102"/><use href="#rock-tile" x="368" y="142"/>
    <use href="#rock-tile" x="72" y="72"/><use href="#rock-tile" x="154" y="104"/><use href="#rock-tile" x="236" y="138"/>
    <path class="cave" d="M96 68 C180 -8 326 18 406 104 C312 164 190 166 86 120 Z"/>
    <text class="label" x="118" y="52">Hollow Reef</text>
    <text class="small" x="134" y="164">Reading</text>
    <circle class="icon-ring-blue" cx="224" cy="134" r="22"/><rect class="icon-core" x="216" y="126" width="16" height="16" rx="3"/>
    <circle class="icon-ring-green" cx="344" cy="166" r="20"/><path class="icon-core" d="M334 168 L344 154 L354 168 L344 180 Z"/>
  </g>

  <!-- Wide Reef Chamber terrain -->
  <g transform="translate(820 565)">
    <use href="#rock-tile" x="0" y="130"/><use href="#rock-tile" x="78" y="104"/><use href="#rock-tile" x="156" y="112"/>
    <use href="#rock-tile" x="234" y="92"/><use href="#rock-tile" x="312" y="104"/><use href="#rock-tile" x="390" y="88"/>
    <use href="#rock-tile" x="468" y="112"/><use href="#rock-tile" x="546" y="132"/><use href="#rock-tile" x="624" y="150"/>
    <use href="#rock-tile" x="80" y="-86"/><use href="#rock-tile" x="160" y="-110"/><use href="#rock-tile" x="240" y="-92"/>
    <use href="#rock-tile" x="318" y="-64"/><use href="#rock-tile" x="398" y="-78"/><use href="#rock-tile" x="478" y="-44"/>
    <use href="#small-rock" x="300" y="16"/><use href="#small-rock" x="392" y="24"/><use href="#small-rock" x="500" y="4"/>
    <path class="cave" d="M36 12 C196 -106 496 -84 704 74 C562 184 242 202 34 98 Z"/>
    <path fill="#071c24" opacity="0.86" d="M90 30 C232 -38 492 -34 642 70 C488 116 252 122 82 76 Z"/>
    <text class="label" x="144" y="-124">Wide Reef Chamber</text>
    <text class="small" x="148" y="-100">current #574-#575 area</text>
    <circle class="icon-ring-yellow" cx="346" cy="68" r="23"/><path class="icon-core" d="M334 68 L346 52 L360 68 L346 84 Z"/>
    <text class="small" x="374" y="76">payoff slot</text>
    <circle class="icon-ring-blue" cx="548" cy="44" r="21"/><rect class="icon-core" x="540" y="36" width="16" height="16" rx="3"/>
    <text class="small" x="574" y="52">scan slot</text>
  </g>

  <!-- Lower basin / future pocket -->
  <g transform="translate(610 795)">
    <use href="#rock-tile" x="0" y="0"/><use href="#rock-tile" x="80" y="22"/><use href="#rock-tile" x="160" y="42"/>
    <use href="#rock-tile" x="240" y="22"/><use href="#rock-tile" x="320" y="0"/><use href="#rock-tile" x="400" y="24"/>
    <use href="#rock-tile" x="480" y="44"/><use href="#rock-tile" x="560" y="22"/><use href="#rock-tile" x="640" y="4"/>
    <path class="locked" d="M520 -54 C594 -92 694 -58 736 20 C666 72 576 64 520 12 Z"/>
    <text class="small" x="542" y="-70">future salvage / deeper promise</text>
    <circle class="icon-ring-red" cx="682" cy="12" r="22"/><path class="icon-core" d="M672 2 L692 22 M692 2 L672 22" stroke="#e8f8ff" stroke-width="5"/>
  </g>

  <!-- Creature planning markers -->
  <use href="#fish" x="742" y="166" transform="scale(0.86)"/>
  <text class="label" x="665" y="190">Lantern Ray Route</text>
  <use href="#shark" x="1092" y="214" transform="scale(0.8)"/>
  <text class="label" x="1188" y="250">Glassfin Swarm?</text>
  <use href="#gulper" x="542" y="642" transform="scale(0.8)"/>
  <text class="label" x="510" y="760">Gulper pressure below</text>

  <g transform="translate(260 118)">
    <use href="#jelly" x="0" y="0"/><use href="#jelly" x="34" y="6"/><use href="#jelly" x="68" y="-4"/>
  </g>
  <g transform="translate(990 132)">
    <use href="#jelly" x="0" y="0"/><use href="#jelly" x="34" y="4"/><use href="#jelly" x="68" y="-2"/>
  </g>
  <g transform="translate(1310 394)">
    <use href="#jelly" x="0" y="0"/><use href="#jelly" x="34" y="4"/>
    <text class="small" x="-18" y="62">timing obstacle?</text>
  </g>

  <!-- Route overlays -->
  <path class="route" d="M154 310 C310 280 486 332 640 504 C786 662 980 656 1180 634 C1308 620 1406 646 1490 710"/>
  <path class="return" d="M1408 744 C1246 738 1104 696 940 636 C752 568 584 498 430 456"/>

  <!-- Legend and footer -->
  <rect class="legend" x="1048" y="884" width="494" height="150" rx="10"/>
  <text class="title" x="1074" y="928">Legend</text>
  <circle class="icon-ring-blue" cx="1098" cy="970" r="15"/><rect class="icon-core" x="1093" y="965" width="10" height="10" rx="2"/>
  <text class="label" x="1124" y="978">Research / Scan</text>
  <circle class="icon-ring-yellow" cx="1322" cy="970" r="15"/><path class="icon-core" d="M1314 970 L1322 958 L1332 970 L1322 982 Z"/>
  <text class="label" x="1348" y="978">Payoff Slot</text>
  <circle class="icon-ring-green" cx="1098" cy="1014" r="15"/><path class="icon-core" d="M1090 1016 L1098 1004 L1108 1016 L1098 1026 Z"/>
  <text class="label" x="1124" y="1022">Oxygen / Safe Cue</text>
  <circle class="icon-ring-red" cx="1322" cy="1014" r="15"/><path class="icon-core" d="M1314 1006 L1330 1022 M1330 1006 L1314 1022" stroke="#e8f8ff" stroke-width="4"/>
  <text class="label" x="1348" y="1022">Locked / Danger</text>

  <text class="title" x="50" y="972">OceanGame</text>
  <text class="title" x="50" y="1024">Hollow Reef Exploration Map</text>
  <text class="note" x="50" y="1056">Planning reference only. This is not an in-game minimap commitment. Terrain blocks show intended route shape and content placement density.</text>
</svg>
