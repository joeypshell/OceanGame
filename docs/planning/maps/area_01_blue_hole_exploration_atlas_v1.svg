<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <linearGradient id="rockFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb4c2"/>
      <stop offset="0.45" stop-color="#5d8290"/>
      <stop offset="1" stop-color="#345466"/>
    </linearGradient>
    <linearGradient id="rockShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#244051"/>
      <stop offset="1" stop-color="#132332"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #020708; }
      .depth { stroke: #9fb8c1; stroke-width: 2; stroke-dasharray: 8 12; opacity: 0.55; }
      .depthText { fill: #e9f5f8; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 54px; font-weight: 800; }
      .subtitle { fill: #bde7ef; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #f5fbfd; font-family: Arial, sans-serif; font-size: 21px; font-weight: 700; paint-order: stroke; stroke: #020708; stroke-width: 5px; stroke-linejoin: round; }
      .smallLabel { fill: #e2f4f7; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; paint-order: stroke; stroke: #020708; stroke-width: 4px; stroke-linejoin: round; }
      .note { fill: #c8e5ec; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .rock { fill: url(#rockFace); stroke: #6aa1a9; stroke-width: 2; }
      .rockDark { fill: url(#rockShadow); stroke: #274554; stroke-width: 2; }
      .reefDetail { fill: none; stroke: #71b177; stroke-width: 2; opacity: 0.45; }
      .routeLive { fill: none; stroke: #43e3ff; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .routePlanned { fill: none; stroke: #8cf7d4; stroke-width: 6; stroke-dasharray: 18 14; stroke-linecap: round; stroke-linejoin: round; opacity: 0.75; }
      .routeLocked { fill: none; stroke: #ff695e; stroke-width: 6; stroke-dasharray: 8 10; stroke-linecap: round; stroke-linejoin: round; opacity: 0.85; }
      .sliceBox { fill: rgba(35, 226, 255, 0.06); stroke: #38e7ff; stroke-width: 5; stroke-dasharray: 18 12; }
      .futureBox { fill: rgba(180, 170, 255, 0.04); stroke: #9d86ff; stroke-width: 3; stroke-dasharray: 10 12; opacity: 0.8; }
      .iconCircle { stroke: #071016; stroke-width: 5; }
      .legendText { fill: #ffffff; font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; }
      .legendSmall { fill: #d6eef2; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
    </style>
  </defs>

