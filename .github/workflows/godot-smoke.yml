name: Godot Smoke

on:
  push:
  pull_request:

jobs:
  godot-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false

      - name: Launch project headless
        run: godot --headless --path . --quit-after 1

      - name: Check whitespace
        run: git diff --check
