name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Web Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Import Godot project
        run: godot --headless --path . --editor --quit

      - name: Run logic tests
        run: godot --headless --path . --script res://tests/logic_tests.gd

      - name: Validate Area 01 runtime source truth
        run: godot --headless --path . --script res://tests/area01_source_truth_validation.gd

      - name: Validate Area 01 generated source map
        run: node tools/validate-area01-runtime-source-map.mjs

      - name: Validate Area 01 generated placements
        run: node tools/validate-area01-runtime-placements.mjs

      - name: Validate Area 01 playable-water framing
        run: node tools/validate-area01-playable-water-framing.mjs

      - name: Enforce file length guard
        shell: pwsh
        run: ./scripts/check-file-lengths.ps1 -FailOnWarning

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Export Web build
        run: npm run web:export

      - name: Smoke exported Web startup
        run: npm run test:web-release-smoke:existing

      - name: Prepare Pages artifact
        run: |
          test -f exports/web/index.html
          touch exports/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exports/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
